<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#050506" />
    <meta
      name="description"
      content="Hanna Sherin — Full Stack Developer crafting immersive, production-grade web experiences with Laravel, MERN and Java."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <title>Hanna Sherin — Full Stack Developer</title>
    <script>
      // Resolve theme before first paint to avoid a flash of the wrong theme.
      (function () {
        try {
          var saved = localStorage.getItem('theme')
          var prefersLight =
            window.matchMedia &&
            window.matchMedia('(prefers-color-scheme: light)').matches
          var theme = saved || (prefersLight ? 'light' : 'dark')
          document.documentElement.dataset.theme = theme
          var meta = document.querySelector('meta[name="theme-color"]')
          if (meta) meta.setAttribute('content', theme === 'light' ? '#f7f7f5' : '#050506')
        } catch (e) {
          document.documentElement.dataset.theme = 'dark'
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
